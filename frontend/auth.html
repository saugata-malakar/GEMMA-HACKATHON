<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RAKSHA AI - Authentication</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="dashboard_enhancements.css">
    <style>
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            overflow: hidden;
            background-color: var(--bg-dark);
            background-image: 
                radial-gradient(circle at top right, rgba(99, 102, 241, 0.2), transparent 50%),
                radial-gradient(circle at bottom left, rgba(239, 68, 68, 0.15), transparent 50%),
                linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
            background-size: 100% 100%, 100% 100%, 30px 30px, 30px 30px;
        }

        .auth-container {
            width: 100%;
            max-width: 480px;
            perspective: 1000px;
            padding: 1rem;
            z-index: 10;
        }

        .auth-card {
            background: rgba(22, 24, 32, 0.85);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--border-glass);
            border-radius: 24px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.6), inset 0 0 0 1px rgba(255,255,255,0.05);
            padding: 3rem 2.5rem;
            position: relative;
            overflow: hidden;
            transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
            transform-style: preserve-3d;
        }

        .auth-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; height: 3px;
            background: linear-gradient(90deg, transparent, var(--primary), transparent);
            animation: scanline 3s linear infinite;
        }

        @keyframes scanline {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(100%); }
        }

        .logo-header {
            text-align: center;
            margin-bottom: 2rem;
        }

        .logo-header h1 {
            font-size: 2.2rem;
            font-weight: 800;
            margin: 0;
            background: linear-gradient(135deg, #fff, #94a3b8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -1px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }

        .logo-header p {
            color: var(--text-muted);
            font-size: 0.95rem;
            margin-top: 0.5rem;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-label {
            display: block;
            color: var(--text-muted);
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 0.5rem;
            font-weight: 600;
        }

        .form-input {
            width: 100%;
            background: rgba(15, 17, 26, 0.6);
            border: 1px solid var(--border-glass);
            color: var(--text-main);
            padding: 1rem 1.25rem;
            border-radius: 12px;
            font-size: 1rem;
            transition: all 0.3s ease;
            box-sizing: border-box;
        }

        .form-input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px var(--primary-glow);
            background: rgba(255, 255, 255, 0.05);
        }

        .auth-btn {
            width: 100%;
            padding: 1.25rem;
            border-radius: 12px;
            border: none;
            background: linear-gradient(135deg, var(--primary), #4f46e5);
            color: white;
            font-weight: 700;
            font-size: 1.1rem;
            letter-spacing: 1px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 8px 25px var(--primary-glow);
            text-transform: uppercase;
            margin-top: 1rem;
        }

        .auth-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 30px rgba(99, 102, 241, 0.6);
        }

        .google-btn {
            width: 100%;
            padding: 1rem;
            border-radius: 12px;
            border: 1px solid var(--border-glass);
            background: rgba(255,255,255,0.05);
            color: white;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }

        .google-btn:hover {
            background: rgba(255,255,255,0.1);
            border-color: rgba(255,255,255,0.2);
        }

        .divider {
            display: flex;
            align-items: center;
            text-align: center;
            margin: 2rem 0;
            color: var(--text-muted);
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .divider::before, .divider::after {
            content: '';
            flex: 1;
            border-bottom: 1px solid var(--border-glass);
        }

        .divider:not(:empty)::before { margin-right: 1rem; }
        .divider:not(:empty)::after { margin-left: 1rem; }

        .auth-links {
            display: flex;
            justify-content: space-between;
            margin-top: 1.5rem;
            font-size: 0.9rem;
        }

        .auth-links a {
            color: var(--primary);
            text-decoration: none;
            transition: color 0.2s;
            cursor: pointer;
            font-weight: 500;
        }

        .auth-links a:hover {
            color: #818cf8;
            text-decoration: underline;
        }

        .location-btn {
            background: rgba(16, 185, 129, 0.1);
            color: #34d399;
            border: 1px solid rgba(16, 185, 129, 0.3);
            padding: 0.75rem;
            border-radius: 8px;
            width: 100%;
            cursor: pointer;
            font-size: 0.9rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            transition: all 0.2s;
        }

        .location-btn:hover {
            background: rgba(16, 185, 129, 0.2);
        }

        /* View toggles */
        .view-section {
            display: none;
            animation: fadeIn 0.4s ease forwards;
        }
        .view-section.active {
            display: block;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .particles {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
            z-index: 1;
        }
    </style>
</head>
<body>

    <div class="auth-container">
        <div class="auth-card">
            
            <!-- Login View -->
            <div id="view-login" class="view-section active">
                <div class="logo-header">
                    <h1><span style="color:var(--primary)">🛡️</span> RAKSHA <span style="font-size: 1rem; font-weight: 500; color: var(--primary);">AI</span></h1>
                    <p>Emergency Intelligence Platform</p>
                </div>

                <form onsubmit="handleLogin(event)">
                    <div class="form-group">
                        <label class="form-label">Secure ID / Email</label>
                        <input type="email" class="form-input" id="loginEmail" placeholder="commander@raksha.gov" required>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Access Clearance (Password)</label>
                        <input type="password" class="form-input" id="loginPassword" placeholder="••••••••" required>
                    </div>
                    
                    <button type="submit" class="auth-btn">Initialize Connection</button>
                    
                    <button type="button" class="google-btn" onclick="mockGoogleAuth()">
                        <img src="https://upload.wikimedia.org/wikipedia/commons/5/53/Google_%22G%22_Logo.svg" width="20" height="20" alt="G">
                        Authenticate with Google
                    </button>
                </form>

                <div class="auth-links">
                    <a onclick="toggleView('view-recover')">Lost Clearance?</a>
                    <a onclick="toggleView('view-signup')">Request Access</a>
                </div>
            </div>

            <!-- Signup View -->
            <div id="view-signup" class="view-section">
                <div class="logo-header">
                    <h1><span style="color:var(--primary)">🛡️</span> ENLIST</h1>
                    <p>Join the RAKSHA Operations Network</p>
                </div>

                <form onsubmit="handleSignup(event)">
                    <div class="form-group">
                        <label class="form-label">Full Name / Callsign</label>
                        <input type="text" class="form-input" id="signupName" placeholder="Operator Sigma" required>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Secure Email</label>
                        <input type="email" class="form-input" id="signupEmail" placeholder="sigma@raksha.gov" required>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Deployment Location</label>
                        <button type="button" class="location-btn" id="locBtn" onclick="getLocation()">
                            📍 Detect Current Coordinates
                        </button>
                        <input type="hidden" id="signupLat">
                        <input type="hidden" id="signupLng">
                    </div>
                    <div class="form-group">
                        <label class="form-label">Create Access Key</label>
                        <input type="password" class="form-input" id="signupPassword" placeholder="••••••••" required>
                    </div>
                    
                    <button type="submit" class="auth-btn" style="background: linear-gradient(135deg, #10b981, #059669); box-shadow: 0 8px 25px rgba(16, 185, 129, 0.4);">Register Operator</button>
                </form>

                <div class="divider">OR</div>
                <div style="text-align: center; font-size: 0.9rem;">
                    <span style="color: var(--text-muted);">Already have clearance?</span>
                    <a onclick="toggleView('view-login')" style="color: var(--primary); cursor: pointer; font-weight: 600; margin-left: 0.5rem;">Return to Login</a>
                </div>
            </div>

            <!-- Recover View -->
            <div id="view-recover" class="view-section">
                <div class="logo-header">
                    <h1><span style="color:var(--danger)">⚠️</span> RECOVERY</h1>
                    <p>Re-establish secure access link</p>
                </div>

                <form onsubmit="handleRecover(event)">
                    <div class="form-group">
                        <label class="form-label">Registered Secure Email</label>
                        <input type="email" class="form-input" id="recoverEmail" placeholder="Enter your email" required>
                    </div>
                    
                    <button type="submit" class="auth-btn" style="background: linear-gradient(135deg, var(--danger), #b91c1c); box-shadow: 0 8px 25px var(--danger-glow);">Send Override Link</button>
                </form>

                <div class="divider"></div>
                <div style="text-align: center;">
                    <a onclick="toggleView('view-login')" style="color: var(--text-muted); cursor: pointer; font-size: 0.9rem;">Abort Recovery (Back to Login)</a>
                </div>
            </div>

        </div>
    </div>

    <script>
        function toggleView(viewId) {
            document.querySelectorAll('.view-section').forEach(v => v.classList.remove('active'));
            document.getElementById(viewId).classList.add('active');
        }

        function getLocation() {
            const btn = document.getElementById('locBtn');
            btn.innerHTML = '⏳ Scanning satellites...';
            
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(
                    (pos) => {
                        document.getElementById('signupLat').value = pos.coords.latitude;
                        document.getElementById('signupLng').value = pos.coords.longitude;
                        btn.innerHTML = '✅ Locked: ' + pos.coords.latitude.toFixed(4) + ', ' + pos.coords.longitude.toFixed(4);
                        btn.style.background = 'rgba(16, 185, 129, 0.2)';
                        btn.style.color = '#10b981';
                    },
                    (err) => {
                        btn.innerHTML = '❌ Signal Lost. Manual entry required.';
                        btn.style.color = '#ef4444';
                    }
                );
            } else {
                btn.innerHTML = '❌ Geolocation not supported';
            }
        }

        function completeAuth(userEmail) {
            // Mock authentication success
            localStorage.setItem('raksha_auth', JSON.stringify({
                user: userEmail,
                token: 'sys_override_' + Math.random().toString(36).substr(2, 9),
                timestamp: Date.now()
            }));
            
            document.body.style.opacity = '0';
            document.body.style.transition = 'opacity 0.5s ease';
            
            setTimeout(() => {
                window.location.href = 'index.html';
            }, 500);
        }

        function handleLogin(e) {
            e.preventDefault();
            const btn = e.target.querySelector('button[type="submit"]');
            btn.innerHTML = 'Verifying Clearance...';
            setTimeout(() => {
                completeAuth(document.getElementById('loginEmail').value);
            }, 800);
        }

        function handleSignup(e) {
            e.preventDefault();
            const btn = e.target.querySelector('button[type="submit"]');
            btn.innerHTML = 'Registering Node...';
            setTimeout(() => {
                completeAuth(document.getElementById('signupEmail').value);
            }, 1000);
        }

        function handleRecover(e) {
            e.preventDefault();
            const btn = e.target.querySelector('button[type="submit"]');
            btn.innerHTML = 'Transmitting...';
            setTimeout(() => {
                alert('Secure override link transmitted to ' + document.getElementById('recoverEmail').value);
                toggleView('view-login');
            }, 1200);
        }

        function mockGoogleAuth() {
            // Mock Google OAuth popup flow
            completeAuth('google_user@gmail.com');
        }
    </script>
</body>
</html>
