version: '3.8'

services:
  backend:
    build: 
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - OLLAMA_BASE_URL=http://host.docker.internal:11434
      - DATABASE_URL=/app/data/raksha.db
      - GEMMA_CLOUD_MODEL=google/gemini-1.5-flash
      - GEMMA_LOCAL_MODEL=gemma:4b
      - CORS_ORIGINS=["*"]
      - PORT=8000
      - DEBUG=false
    volumes:
      - raksha_data:/app/data
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  raksha_data:
    driver: local