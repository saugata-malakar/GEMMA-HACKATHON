version: '3.8'

services:
  backend:
    build: 
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - OLLAMA_BASE_URL=http://host.docker.internal:11434
      - DATABASE_URL=/data/raksha.db
      - GEMMA_CLOUD_MODEL=gemma-4-27b-it
      - GEMMA_LOCAL_MODEL=gemma4:4b
    volumes:
      - raksha_data:/data
    extra_hosts:
      - "host.docker.internal:host-gateway"

volumes:
  raksha_data:
